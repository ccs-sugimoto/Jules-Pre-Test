<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>テトリス</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="titleScreen">
        <h1>テトリス</h1>
        <button id="startButton">ゲーム開始</button>
    </div>
    <div id="gameScreen" style="display: none;">
        <canvas id="gameCanvas" width="300" height="600" style="border: 1px solid black;"></canvas>
        <div id="nextTetrominoArea">
            <h3>つぎのミノ</h3>
            <canvas id="nextTetrominoCanvas" width="120" height="120" style="border: 1px solid black;"></canvas>
            <div id="scoreArea">スコア: 0</div>
            <div id="timeArea">時間: 0秒</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
